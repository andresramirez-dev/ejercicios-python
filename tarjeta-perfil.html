<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Perfil</title>
  <style>
    /* ── Reset básico ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Fondo de la página ── */
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Tarjeta principal ── */
    .tarjeta {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 32px;
      width: 340px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    /* ── Avatar (círculo con inicial) ── */
    .avatar {
      width: 90px;
      height: 90px;
      background-color: #D97706;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }

    /* ── Nombre ── */
    .nombre {
      font-size: 22px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 4px;
    }

    /* ── Cargo / rol ── */
    .rol {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    /* ── Separador ── */
    .separador {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 20px 0;
    }

    /* ── Etiquetas de habilidades ── */
    .habilidades {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .etiqueta {
      background-color: #fef3c7;
      color: #92400e;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Información de contacto ── */
    .contacto {
      text-align: left;
    }

    .contacto-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #374151;
      margin-bottom: 10px;
    }

    .contacto-item span.icono {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* ── Botón ── */
    .boton {
      display: block;
      margin-top: 20px;
      background-color: #D97706;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .boton:hover {
      background-color: #b45309;
    }
  </style>
</head>
<body>

  <div class="tarjeta">

    <!-- Avatar -->
    <div class="avatar">A</div>

    <!-- Nombre y rol -->
    <div class="nombre">Andrés Ramírez</div>
    <div class="rol">Técnico en Codificación de Software</div>

    <hr class="separador">

    <!-- Habilidades -->
    <div class="habilidades">
      <span class="etiqueta">Python</span>
      <span class="etiqueta">JavaScript</span>
      <span class="etiqueta">HTML</span>
      <span class="etiqueta">CSS</span>
      <span class="etiqueta">VS Code</span>
    </div>

    <hr class="separador">

    <!-- Contacto -->
    <div class="contacto">
      <div class="contacto-item">
        <span class="icono">📍</span>
        <span>Bogotá, Colombia</span>
      </div>
      <div class="contacto-item">
        <span class="icono">📧</span>
        <span>andres.ramirez97@gmail.com</span>
      </div>
      <div class="contacto-item">
        <span class="icono">💻</span>
        <span>github.com/andresramirez-dev</span>
      </div>
    </div>

    <!-- Botón -->
    <a class="boton" href="https://github.com/andresramirez-dev" target="_blank">
      Ver GitHub
    </a>

  </div>

</body>
</html>
